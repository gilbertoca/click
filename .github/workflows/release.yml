name: Build and Release JAR

on:
  push:
    tags:
      - 'click-*' # Triggers the workflow when you push a tag starting with 'click-' 
  workflow_dispatch: # <-- Add this line to enable the web button
    inputs:
      tag_name:
        description: 'Target Git Tag for the release (e.g., click-2.7.0)'
        required: true
        default: 'click-2.7.0'
permissions:
  contents: write # Grants the workflow permission to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Change to your required Java version (e.g., '11', '21')
        distribution: 'temurin'
        cache: 'maven' # Speeds up builds by caching Maven dependencies

    - name: Build and Package JAR
      run: mvn -B package -DskipTests # -B runs in non-interactive batch mode

    - name: Pack Distribution Assets
      id: pack_assets
      run: |
        # 1. Descobre automaticamente a versão atual do projeto (ex: 2.7.0)
        PROJECT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Versão detectada: $PROJECT_VERSION"
        
        mkdir -p dist-assets

        # 2. Copia os JARs estruturados com a versão dinâmica
        cp click/target/click-$PROJECT_VERSION.jar dist-assets/
        cp click/target/click-$PROJECT_VERSION-mock.jar dist-assets/
        cp click/target/click-$PROJECT_VERSION-javadoc.jar dist-assets/
        cp extras/target/click-extras-$PROJECT_VERSION.jar dist-assets/
        cp extras/target/click-extras-$PROJECT_VERSION-javadoc.jar dist-assets/
        
        # 3. Copia os artefatos do Guia do Usuário
        cp user-guide/target/generated-docs/index.html dist-assets/apache-click-user-guide-$PROJECT_VERSION.html
        cp user-guide/target/generated-docs/index.pdf dist-assets/apache-click-user-guide-$PROJECT_VERSION.pdf
        
        # 4. Compacta a distribuição binária em um ZIP limpo
        # (Adicionamos o -j para não salvar a estrutura de pastas inteira dentro do zip)
        zip -j dist-assets/apache-click-$PROJECT_VERSION-bin.zip dist-assets/*.jar dist-assets/*.html dist-assets/*.pdf
        
        # 5. Passa o caminho do ZIP final para a Action de Release
        echo "zip_path=dist-assets/apache-click-$PROJECT_VERSION-bin.zip" >> $GITHUB_OUTPUT

    - name: Create GitHub Release and Upload ZIP
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.pack_assets.outputs.zip_path }}
        name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
