name: Build and Release JAR

on:
  push:
    tags:
      - 'click-*' # Triggers the workflow when you push a tag starting with 'click-' 
  workflow_dispatch: # <-- Add this line to enable the web button
    inputs:
      tag_name:
        description: 'Target Git Tag for the release (e.g., click-2.7.0)'
        required: true
        default: 'click-2.7.0'
permissions:
  contents: write # Grants the workflow permission to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Change to your required Java version (e.g., '11', '21')
        distribution: 'temurin'
        cache: 'maven' # Speeds up builds by caching Maven dependencies

    - name: Build and Package JAR
      run: mvn -B package -DskipTests # -B runs in non-interactive batch mode

    - name: Locate JAR file
      id: locate_jar
      run: |
        # Finds the generated JAR file in the target directory, excluding original/shaded duplicates
        JAR_PATH=$(ls target/*.jar | grep -v 'original-' | head -n 1)
        echo "path=$JAR_PATH" >> $GITHUB_OUTPUT
        echo "name=$(basename $JAR_PATH)" >> $GITHUB_OUTPUT

    - name: Create GitHub Release and Upload JAR
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.locate_jar.outputs.path }}
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
